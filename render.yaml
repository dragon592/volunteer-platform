services:
  - type: web
    name: volunteer-platform
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput --clear
      python manage.py migrate --noinput
      python import_data.py data_dump.json
    startCommand: gunicorn volunteer.wsgi:application --log-file -
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: volunteer-db
          property: connectionString
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_SETTINGS_MODULE
        value: volunteer.settings
databases:
  - type: postgresql
    name: volunteer-db
    plan: free