databases:
  - name: volunteer-platform-db
    plan: free

services:
  - type: web
    name: volunteer-platform
    env: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn volunteer.wsgi:application
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: volunteer-platform-db
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com,127.0.0.1,localhost,testserver
