services:
  - type: web
    name: volunteer-platform
    env: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn volunteer.wsgi:application
    autoDeploy: true
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: .onrender.com,127.0.0.1,localhost,testserver
