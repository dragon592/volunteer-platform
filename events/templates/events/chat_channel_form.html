{% extends 'index.html' %}

{% block title %}Новый канал — {{ event.title }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="bg-white rounded-3xl shadow-xl p-8">
        <h1 class="font-display text-2xl font-bold text-gray-800 mb-2">Создать канал</h1>
        <p class="text-gray-600 mb-6">Событие: {{ event.title }}</p>

        <form method="POST" class="space-y-5">
            {% csrf_token %}
            <div>
                <label class="block text-sm text-gray-700 font-semibold mb-2">Название канала</label>
                {{ form.name }}
            </div>
            <div>
                <label class="block text-sm text-gray-700 font-semibold mb-2">Тема</label>
                {{ form.topic }}
            </div>
            <div class="flex gap-3">
                <button type="submit" class="bg-forest-600 text-white px-6 py-2.5 rounded-lg font-semibold hover:bg-forest-700 transition-all">
                    Создать
                </button>
                <a href="{% url 'event_detail' event.pk %}" class="bg-gray-200 text-gray-700 px-6 py-2.5 rounded-lg font-semibold hover:bg-gray-300 transition-all">
                    Отмена
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
